name: Build deploy extension
description: >-
  Configure and build the CPU-only `rfnn_deploy` deployment extension (RF3M loader + ONNX
  field predictors) on Linux or Windows. Mirrors setup.py's deploy build: tiny-cuda-nn OFF,
  Vulkan OFF, no torch/CUDA. The compiled module (.so / .pyd) lands in <repo>/lib, and the
  fetched ONNX Runtime shared library is staged next to it so the module imports.

inputs:
  python-version:
    description: Python version to build the extension against.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        allow-prereleases: true

    # Ninja needs the MSVC toolchain on PATH; this loads the x64 dev environment.
    - name: Set up MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install build tooling
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "cmake" "ninja>=1.13.0" "pybind11>=3.0.4"

    # ONNX Runtime is a large prebuilt download and RadFiled3D/glm/pybind are FetchContent'd;
    # cache the _deps tree per-OS so only the first run pays the download/compile cost.
    - name: Cache CMake dependencies
      uses: actions/cache@v4
      with:
        path: build_deploy/_deps
        key: deploy-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          deploy-deps-${{ runner.os }}-

    - name: Configure & build (deployment, TCNN off)
      # pwsh (not bash) on BOTH OSes: under Git-bash on Windows, /usr/bin/link shadows MSVC's
      # link.exe and the Ninja build fails at link time. pwsh keeps the MSVC env clean. It is
      # preinstalled on the Linux runners too, so one shell covers both.
      shell: pwsh
      env:
        PYTHON_EXECUTABLE: python
      run: |
        # Tee output to log files too (Tee-Object is a cmdlet, so $LASTEXITCODE still reflects cmake).
        $pyexe = (python -c "import sys; print(sys.executable.replace(chr(92), '/'))")
        cmake -S . -B build_deploy -G Ninja `
          "-DPython_EXECUTABLE=$pyexe" `
          "-DPYTHON_VERSION=${{ inputs.python-version }}" `
          -DBuild_DeployPyBindings=ON `
          -DRFNN_WITH_TCNN=OFF `
          -DRFNN_BACKEND_VULKAN=OFF `
          -DBUILD_RADFIELDNN_TESTS=OFF `
          -DBUILD_EXAMPLES=OFF `
          -DORT_GPU=OFF `
          -DCMAKE_BUILD_TYPE=Release 2>&1 | Tee-Object -FilePath configure.log
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        cmake --build build_deploy --target rfnn_deploy 2>&1 | Tee-Object -FilePath build.log
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

    # Diagnostics: on a build failure, emit the tail of the captured log as a GitHub ::error::
    # annotation. Unlike run logs (admin-only) and artifacts (auth-only), check-run annotations
    # are readable on a public repo without auth. Remove once the matrix is stable.
    - name: Emit build error as annotation on failure
      if: failure()
      shell: bash
      run: |
        python - <<'PY'
        import os
        log = "build.log" if os.path.exists("build.log") and os.path.getsize("build.log") else "configure.log"
        try:
            lines = open(log, encoding="utf-8", errors="replace").read().splitlines()
        except FileNotFoundError:
            lines = [f"(no {log} produced)"]
        tail = "\n".join(lines[-70:])[-4000:]
        enc = tail.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
        print(f"::error title=deploy-build ({log})::{enc}")
        PY

    # Diagnostics: on a build failure, surface the captured logs as an artifact (admin-only run
    # logs make remote debugging hard). Remove once the matrix is stable.
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ runner.os }}-py${{ inputs.python-version }}
        path: |
          configure.log
          build.log
          build_deploy/CMakeFiles/CMakeError.log
          build_deploy/CMakeFiles/CMakeOutput.log
        if-no-files-found: warn

    # The module links ONNX Runtime's shared lib (libonnxruntime.so / onnxruntime.dll). Copy it
    # next to the module in lib/: on Windows the loader searches the module's own directory, and
    # on Linux LD_LIBRARY_PATH=lib then resolves it — so a bare `import rfnn_deploy` works.
    - name: Stage ONNX Runtime next to the module
      shell: bash
      run: |
        cp -v build_deploy/_deps/fetch_onnxruntime-src/lib/*onnxruntime* lib/ 2>/dev/null || true
        # Any other runtime libs the build produced (e.g. RadFiled3D if built shared).
        find build_deploy -maxdepth 6 \( -name '*.dll' -o -name 'libRadFiled3D*.so*' \) \
          -exec cp -v {} lib/ \; 2>/dev/null || true
