name: Tests

# Build the deployment extension and run the simplified, CPU-only deploy test — the pure
# ONNX-Runtime RF3M round-trip, which needs no torch / CUDA / tiny-cuda-nn. Runs across
# Linux + Windows and Python 3.12 / 3.13 / 3.14. The rest of the suite (GPU / deep-learning
# tests under tests/) is kept in the repo but not exercised here.
on:
  push:
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - name: Build deploy extension
        uses: ./.github/actions/build-deploy
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: python -m pip install pytest numpy onnx

      - name: Run CPU deploy test (no deep-learning stack)
        shell: bash
        env:
          # The deploy test falls back to `import rfnn_deploy` from <repo>/lib, where the build
          # staged ONNX Runtime's shared lib. On Windows the module's own dir is searched; on
          # Linux LD_LIBRARY_PATH resolves it.
          PYTHONPATH: ${{ github.workspace }}/lib
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib
        run: pytest tests/deploy/test_rf3m_metadata_roundtrip.py -v
